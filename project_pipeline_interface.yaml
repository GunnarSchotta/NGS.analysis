pipeline_name: NGS.analysis
output_schema: pipestat_project_results_schema.yaml

project_interface:
  var_templates:
    project_name: "{project.name}"
    record_identifier: "{project.name}"
  command_template: >
    python /store24/project24/becgsc_001/dev/NGS.analysis.office/NGS.analysis/NGS.analysis.collator.py
    --config {looper.pep_config}
    -O {looper.output_dir}
    -P {compute.cores}
    -M {compute.mem}
    -n {project.name}
    -r {looper.output_dir}/samples
    --pipestat-config {pipestat.config_file}

# Submission resources for the project job (SLURM)
compute:
  mem: 20G
  cores: 32
  partition: slim18
  time: 01:00:00
